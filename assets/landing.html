<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisaes — Select Application</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0c0f14;
            color: #e8e6e1;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(30, 64, 110, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(45, 90, 60, 0.1) 0%, transparent 70%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 680px;
        }
        .brand-name {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            color: #9ca3af;
            margin-bottom: 3rem;
            line-height: 1.4;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 2rem 1.75rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            text-align: left;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card-tb::before {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(37, 99, 235, 0.02) 100%);
        }
        .card-mb::before {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.08) 0%, rgba(22, 163, 74, 0.02) 100%);
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.4);
        }
        .card:hover::before { opacity: 1; }
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
            position: relative;
            z-index: 1;
        }
        .card-tb .card-icon {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .card-mb .card-icon {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }
        .card-tb .card-title { color: #93bbfc; }
        .card-mb .card-title { color: #86efac; }
        .card-desc {
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }
        .card-arrow {
            position: absolute;
            top: 1.75rem;
            right: 1.75rem;
            opacity: 0;
            transform: translate(-4px, 4px);
            transition: all 0.3s ease;
            z-index: 1;
        }
        .card:hover .card-arrow {
            opacity: 0.5;
            transform: translate(0, 0);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: #374151;
        }
        @media (max-width: 540px) {
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-name">Kisaes LLC</div>
        <h1>Select an application</h1>
        <div class="cards">
            <a href="/tb/" class="card card-tb">
                <svg class="card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M4 12L12 4M12 4H6M12 4V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="18" height="18" rx="3" stroke="#60a5fa" stroke-width="1.5"/>
                        <line x1="3" y1="9" x2="21" y2="9" stroke="#60a5fa" stroke-width="1.5"/>
                        <line x1="9" y1="9" x2="9" y2="21" stroke="#60a5fa" stroke-width="1.5"/>
                        <line x1="15" y1="9" x2="15" y2="21" stroke="#60a5fa" stroke-width="1.5"/>
                    </svg>
                </div>
                <div class="card-title">Vibe Trial Balance</div>
                <div class="card-desc">Trial balance, tax workpapers, and AI-assisted classification</div>
            </a>
            <a href="/mb/" class="card card-mb">
                <svg class="card-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M4 12L12 4M12 4H6M12 4V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="card-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M4 4h16v16H4z" rx="3" stroke="#4ade80" stroke-width="1.5" fill="none"/>
                        <path d="M8 12h8M8 8h5M8 16h6" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="card-title">Vibe MyBooks</div>
                <div class="card-desc">Bookkeeping, transaction coding, and client portal</div>
            </a>
        </div>
        <div class="footer">Self-hosted &middot; Privacy-first</div>
    </div>
</body>
</html>
